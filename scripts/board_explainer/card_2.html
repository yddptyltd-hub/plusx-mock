<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
* { box-sizing:border-box; margin:0; padding:0 }
html, body { width:1080px; height:1920px; background:#ffffff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif; color:#1a1a1a; overflow:hidden }
.card { width:1080px; height:1920px; padding:80px; display:flex; flex-direction:column; justify-content:space-between }
.label { font-size:24px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#4a5568; margin-bottom:24px }
h1 { font-size:72px; font-weight:700; line-height:1.15; margin-bottom:32px }
h2 { font-size:52px; font-weight:700; line-height:1.2; margin-bottom:28px }
p { font-size:36px; line-height:1.6; margin-bottom:20px; color:#1a1a1a }
.small { font-size:30px; color:#4a5568; line-height:1.5 }
.footer { font-size:26px; color:#4a5568; font-weight:600; border-top:2px solid #e5e7eb; padding-top:32px }
.accent { color:#0f766e }
.bullet { font-size:32px; line-height:1.7; color:#1a1a1a }
.bullet-item { margin-bottom:12px }

.flow { display:flex; align-items:center; gap:16px; margin:40px 0 }
.box { flex:1; border:2px solid #1a1a1a; border-radius:6px; padding:24px 16px; text-align:center; font-size:32px; font-weight:700; line-height:1.2 }
.box-accent { background:#0f766e; border-color:#0f766e; color:#fff }
.arrow { font-size:40px; color:#1a1a1a; flex:0 0 32px; text-align:center }
.tagline { font-size:38px; font-weight:600; color:#1a1a1a; margin:24px 0 32px }
</style></head>
<body><div class="card">
  <div>
    <div class="label">Goal 1: Managers</div>
    <div class="flow">
      <div class="box">Stranger</div>
      <div class="arrow">&#8594;</div>
      <div class="box box-accent">System</div>
      <div class="arrow">&#8594;</div>
      <div class="box">Working<br>manager</div>
    </div>
    <div class="tagline">A system that creates a manager without us in the room</div>
    <div class="bullet">
      <div class="bullet-item">1 &middot; What does a manager do day-to-day?</div>
      <div class="bullet-item">2 &middot; Cheapest way to teach each piece?</div>
      <div class="bullet-item">3 &middot; How do we know they&#8217;re ready?</div>
      <div class="bullet-item">4 &middot; How do we maintain it?</div>
    </div>
  </div>
  <div class="footer">Q3 plan &middot; 12 weeks &middot; plusx</div>
</div></body></html>
