<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
* { box-sizing:border-box; margin:0; padding:0 }
html, body { width:1080px; height:1920px; background:#ffffff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif; color:#1a1a1a; overflow:hidden }
.card { width:1080px; height:1920px; padding:80px; display:flex; flex-direction:column; justify-content:space-between }
.label { font-size:24px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#4a5568; margin-bottom:24px }
h1 { font-size:72px; font-weight:700; line-height:1.15; margin-bottom:32px }
h2 { font-size:52px; font-weight:700; line-height:1.2; margin-bottom:28px }
p { font-size:36px; line-height:1.6; margin-bottom:20px; color:#1a1a1a }
.small { font-size:30px; color:#4a5568; line-height:1.5 }
.footer { font-size:26px; color:#4a5568; font-weight:600; border-top:2px solid #e5e7eb; padding-top:32px }
.accent { color:#0f766e }
.bullet { font-size:32px; line-height:1.7; color:#1a1a1a }
.bullet-item { margin-bottom:12px }

.bars { margin:40px 0 }
.bar-row { display:flex; align-items:center; margin-bottom:16px }
.bar-label { width:100px; font-size:30px; font-weight:600; color:#4a5568 }
.bar-track { flex:1; height:40px; background:#e5e7eb; border-radius:4px; position:relative }
.bar-full { width:100%; height:40px; background:#0f766e; border-radius:4px }
.bar-half { width:50%; height:40px; background:#0f766e; border-radius:4px; opacity:0.5 }
.gap-label { margin-left:16px; font-size:24px; color:#4a5568; font-style:normal }
.slogan { font-size:32px; font-weight:600; color:#1a1a1a; margin-top:8px }
.split { margin:40px 0 }
.big-head { font-size:58px; font-weight:700; line-height:1.1; margin-bottom:16px }
.sub-head { font-size:42px; font-weight:400; color:#4a5568; margin-bottom:24px }
.why { font-size:38px; font-weight:600; color:#0f766e }
</style></head>
<body><div class="card">
  <div>
    <div class="label">Why this meeting exists</div>
    <div class="bars">
      <div class="bar-row"><span class="bar-label">Say</span><div class="bar-track"><div class="bar-full"></div></div></div>
      <div style="height:8px"></div>
      <div class="bar-row"><span class="bar-label">Do</span><div class="bar-track"><div class="bar-half"></div><span class="gap-label">the gap</span></div></div>
      <div class="slogan">Systems close the gap.</div>
    </div>
    <div class="split">
      <div class="big-head">Today: every deal needs us</div>
      <div class="big-head" style="color:#0f766e">Week 12: LPX runs without us</div>
      <div style="height:24px"></div>
      <div class="why">Why: so we can launch OwnX by end of summer</div>
    </div>
  </div>
  <div class="footer">Q3 plan &middot; 12 weeks &middot; plusx</div>
</div></body></html>
