<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
* { box-sizing:border-box; margin:0; padding:0 }
html, body { width:1200px; height:630px; background:#ffffff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif; overflow:hidden }
.card { width:1200px; height:630px; padding:60px 80px; display:flex; flex-direction:column; justify-content:space-between; background:#ffffff }
.top { font-size:52px; font-weight:700; line-height:1.2; color:#1a1a1a; margin-bottom:32px }
.bars { margin:0 0 32px }
.bar-row { display:flex; align-items:center; margin-bottom:12px }
.bar-label { width:80px; font-size:24px; font-weight:600; color:#4a5568 }
.bar-track { flex:1; height:32px; background:#e5e7eb; border-radius:3px }
.bar-full { width:100%; height:32px; background:#0f766e; border-radius:3px }
.bar-half { width:50%; height:32px; background:#0f766e; border-radius:3px; opacity:0.5 }
.gap-lbl { margin-left:12px; font-size:18px; color:#4a5568 }
.slogan { font-size:22px; font-weight:600; color:#1a1a1a; margin-top:8px }
.sub { font-size:26px; color:#4a5568; line-height:1.5 }
.footer { font-size:20px; font-weight:600; color:#4a5568; border-top:1px solid #e5e7eb; padding-top:20px }
</style></head>
<body><div class="card">
  <div class="top">Q3 Plan: 12 Weeks to Launch OwnX</div>
  <div class="bars">
    <div class="bar-row"><span class="bar-label">Say</span><div class="bar-track"><div class="bar-full"></div></div></div>
    <div style="height:6px"></div>
    <div class="bar-row"><span class="bar-label">Do</span><div class="bar-track"><div class="bar-half"></div><span class="gap-lbl">the gap</span></div></div>
    <div class="slogan">Systems close the gap.</div>
  </div>
  <div class="sub">The 3 systems &middot; the Friday meeting &middot; the Sunday rhythm &middot; 90-second read, 6-minute listen</div>
  <div class="footer">plusx-mock.pages.dev/board-explainer/</div>
</div></body></html>
